<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 820" font-family="-apple-system, 'Segoe UI', 'SF Pro Display', 'Inter', system-ui, sans-serif" role="img" aria-label="Palinurus wiring diagram: physical edge to ZeroClaw agent to Solana">
  <title>Palinurus — wiring diagram (physical edge → ZeroClaw → Solana)</title>
  <desc>A Raspberry Pi running ZeroClaw hosts two Palinurus WIT plugins: depin-attest (turns a sensor reading into a Solana Attestation Service attestation) and depin-rewards (watches a public Helium hotspot via the Relay API and fires Telegram alerts). Every transaction is unsigned; a human or Squads multisig signs on the cold path.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#010409"/>
    </linearGradient>
    <marker id="arrow-teal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#2dd4bf"/></marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#fbbf24"/></marker>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#229ED9"/></marker>
    <marker id="arrow-coral" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#ff7a59"/></marker>
    <marker id="arrow-ice" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7dd3fc"/></marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#6e7681"/></marker>
    <linearGradient id="solana" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#9945FF"/>
      <stop offset="1" stop-color="#14F195"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1440" height="820" fill="url(#bg)"/>

  <!-- ───────── title ───────── -->
  <g id="title">
    <text x="720" y="46" text-anchor="middle" font-size="27" font-weight="700" fill="#e6edf3">Palinurus — the Solana DePIN node that talks</text>
    <text x="720" y="75" text-anchor="middle" font-size="14" fill="#8b949e">physical edge  →  ZeroClaw agent  →  Solana    ·    wiring &amp; custody</text>
  </g>

  <!-- ───────── column headers ───────── -->
  <g id="col-headers" font-size="11.5" fill="#6e7681" text-anchor="middle" letter-spacing="1.5">
    <text x="180" y="118">PHYSICAL EDGE</text>
    <text x="435" y="118">AGENT RUNTIME</text>
    <text x="700" y="118">PLUGINS (WIT, wasm32-wasip2)</text>
    <text x="965" y="118">EXTERNAL APIS</text>
    <text x="1240" y="118">SOLANA</text>
  </g>

  <!-- ───────── Node 1: Physical edge ───────── -->
  <g id="node-edge">
    <rect x="80" y="138" width="200" height="272" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <rect x="110" y="168" width="140" height="84" rx="8" fill="#0d1117" stroke="#2fa755" stroke-width="1.5"/>
    <text x="180" y="198" text-anchor="middle" font-size="14" font-weight="700" fill="#2fa755">Raspberry Pi 4</text>
    <text x="180" y="218" text-anchor="middle" font-size="10.5" fill="#8b949e">GPIO · I²C · SPI</text>
    <text x="180" y="236" text-anchor="middle" font-size="10.5" fill="#8b949e">ZeroClaw host OS</text>
    <circle cx="180" cy="308" r="24" fill="#0d1117" stroke="#2fa755" stroke-width="1.5"/>
    <circle cx="180" cy="308" r="7" fill="#2fa755"/>
    <text x="180" y="356" text-anchor="middle" font-size="13" font-weight="600" fill="#e6edf3">Sensor</text>
    <text x="180" y="376" text-anchor="middle" font-size="10.5" fill="#8b949e">temp · CO₂ · GPS · …</text>
    <text x="180" y="394" text-anchor="middle" font-size="10.5" fill="#8b949e">periodic reading</text>
  </g>

  <!-- ───────── Node 2: ZeroClaw runtime ───────── -->
  <g id="node-zc">
    <rect x="335" y="138" width="200" height="272" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="435" y="170" text-anchor="middle" font-size="15" font-weight="700" fill="#e6edf3">ZeroClaw</text>
    <text x="435" y="190" text-anchor="middle" font-size="10.5" fill="#8b949e">self-hosted Rust agent</text>
    <rect x="355" y="206" width="160" height="50" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.2"/>
    <text x="435" y="226" text-anchor="middle" font-size="11.5" font-weight="600" fill="#58a6ff">SOP engine</text>
    <text x="435" y="244" text-anchor="middle" font-size="9.5" fill="#8b949e">MQTT / peripheral trigger</text>
    <rect x="355" y="264" width="160" height="50" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.2"/>
    <text x="435" y="284" text-anchor="middle" font-size="11.5" font-weight="600" fill="#58a6ff">LLM tool-calling</text>
    <text x="435" y="302" text-anchor="middle" font-size="9.5" fill="#8b949e">decides · invokes plugin</text>
    <rect x="355" y="322" width="160" height="50" rx="8" fill="#0d1117" stroke="#58a6ff" stroke-width="1.2"/>
    <text x="435" y="342" text-anchor="middle" font-size="11.5" font-weight="600" fill="#58a6ff">WIT component host</text>
    <text x="435" y="360" text-anchor="middle" font-size="9.5" fill="#8b949e">jailed, capability-scoped</text>
  </g>

  <!-- ───────── Node 3: Plugins container ───────── -->
  <g id="node-plugins">
    <rect x="590" y="128" width="220" height="292" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="700" y="150" text-anchor="middle" font-size="10.5" fill="#6e7681" letter-spacing="1">PALINURUS</text>

    <!-- depin-attest -->
    <rect x="604" y="162" width="192" height="116" rx="10" fill="#0d1117" stroke="#2dd4bf" stroke-width="1.6"/>
    <text x="700" y="186" text-anchor="middle" font-size="14" font-weight="700" fill="#2dd4bf">depin-attest</text>
    <text x="700" y="206" text-anchor="middle" font-size="10" fill="#e6edf3">reading → SAS</text>
    <text x="700" y="222" text-anchor="middle" font-size="10" fill="#e6edf3">create_attestation ix</text>
    <text x="700" y="238" text-anchor="middle" font-size="10" fill="#e6edf3">+ durable nonce</text>
    <rect x="638" y="250" width="124" height="20" rx="10" fill="#2dd4bf" fill-opacity="0.14" stroke="#2dd4bf" stroke-width="0.8"/>
    <text x="700" y="264" text-anchor="middle" font-size="10" font-weight="700" fill="#2dd4bf">T1 default · T2 opt</text>

    <!-- depin-rewards -->
    <rect x="604" y="288" width="192" height="120" rx="10" fill="#0d1117" stroke="#fbbf24" stroke-width="1.6"/>
    <text x="700" y="312" text-anchor="middle" font-size="14" font-weight="700" fill="#fbbf24">depin-rewards</text>
    <text x="700" y="332" text-anchor="middle" font-size="10" fill="#e6edf3">watch hotspot</text>
    <text x="700" y="348" text-anchor="middle" font-size="10" fill="#e6edf3">offline-alert + summary</text>
    <text x="700" y="364" text-anchor="middle" font-size="10" fill="#e6edf3">+ unsigned claim (roadmap)</text>
    <rect x="610" y="376" width="180" height="22" rx="11" fill="#fbbf24" fill-opacity="0.14" stroke="#fbbf24" stroke-width="0.8"/>
    <text x="700" y="391" text-anchor="middle" font-size="10" font-weight="700" fill="#fbbf24">T0 reads · T1 unsigned · NO T2</text>
  </g>

  <!-- ───────── Node 4: External APIs ───────── -->
  <g id="node-external">
    <rect x="865" y="288" width="200" height="120" rx="14" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
    <text x="965" y="312" text-anchor="middle" font-size="10.5" fill="#6e7681" letter-spacing="1">PUBLIC DATA</text>
    <rect x="881" y="322" width="168" height="34" rx="8" fill="#0d1117" stroke="#ff7a59" stroke-width="1.4"/>
    <text x="965" y="343" text-anchor="middle" font-size="11.5" font-weight="600" fill="#ff7a59">Relay API (read)</text>
    <rect x="881" y="362" width="168" height="34" rx="8" fill="#0d1117" stroke="#229ED9" stroke-width="1.4"/>
    <text x="965" y="383" text-anchor="middle" font-size="11.5" font-weight="600" fill="#229ED9">Telegram Bot API</text>
  </g>

  <!-- ───────── Node 5: Solana ───────── -->
  <g id="node-solana">
    <rect x="1120" y="138" width="240" height="272" rx="14" fill="#161b22" stroke="url(#solana)" stroke-width="1.8"/>
    <text x="1240" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="#e6edf3">Solana</text>
    <text x="1240" y="192" text-anchor="middle" font-size="10.5" fill="#8b949e">mainnet-verified · devnet</text>

    <rect x="1134" y="208" width="212" height="66" rx="10" fill="#0d1117" stroke="#14F195" stroke-width="1.4"/>
    <text x="1240" y="230" text-anchor="middle" font-size="12.5" font-weight="700" fill="#14F195">Solana Attestation Svc</text>
    <text x="1240" y="248" text-anchor="middle" font-size="9.5" fill="#8b949e">create_attestation → on-chain PDA</text>
    <text x="1240" y="263" text-anchor="middle" font-size="9.5" fill="#8b949e">explorer-verifiable · reusable</text>

    <rect x="1134" y="286" width="212" height="66" rx="10" fill="#0d1117" stroke="#9945FF" stroke-width="1.4" stroke-dasharray="5 3"/>
    <text x="1240" y="308" text-anchor="middle" font-size="12.5" font-weight="700" fill="#9945FF">lazy-distributor · roadmap</text>
    <text x="1240" y="326" text-anchor="middle" font-size="9.5" fill="#8b949e">distribute_compression_rewards_v0</text>
    <text x="1240" y="341" text-anchor="middle" font-size="9.5" fill="#8b949e">cNFT · DAS get_asset_proof · merkle</text>

    <text x="1240" y="380" text-anchor="middle" font-size="10" fill="#6e7681">attestations = an oracle feed</text>
  </g>

  <!-- ═══════════ flow arrows ═══════════ -->
  <!-- edge → ZeroClaw -->
  <line x1="280" y1="270" x2="331" y2="270" stroke="#2fa755" stroke-width="2.2" marker-end="url(#arrow-muted)"/>
  <text x="306" y="261" text-anchor="middle" font-size="9.5" fill="#8b949e">reading</text>

  <!-- ZeroClaw → plugins -->
  <line x1="535" y1="270" x2="586" y2="270" stroke="#58a6ff" stroke-width="2.2" marker-end="url(#arrow-muted)"/>
  <text x="560" y="261" text-anchor="middle" font-size="9.5" fill="#8b949e">execute()</text>

  <!-- depin-attest → Solana SAS (unsigned tx, arcs over the external box) -->
  <path d="M 796 220 C 900 220, 1020 222, 1118 234" fill="none" stroke="#2dd4bf" stroke-width="2.4" marker-end="url(#arrow-teal)"/>
  <text x="957" y="210" text-anchor="middle" font-size="10.5" fill="#2dd4bf" font-weight="600">unsigned versioned tx</text>

  <!-- depin-rewards → Relay (read, bidirectional) -->
  <line x1="796" y1="332" x2="877" y2="338" stroke="#ff7a59" stroke-width="2.2" marker-end="url(#arrow-coral)"/>
  <line x1="877" y1="348" x2="796" y2="342" stroke="#ff7a59" stroke-width="2.2" marker-end="url(#arrow-coral)" stroke-dasharray="4 3"/>
  <text x="836" y="324" text-anchor="middle" font-size="9.5" fill="#ff7a59">GET</text>

  <!-- depin-rewards → Telegram (POST alert) -->
  <line x1="796" y1="376" x2="877" y2="380" stroke="#229ED9" stroke-width="2.2" marker-end="url(#arrow-blue)"/>
  <text x="836" y="396" text-anchor="middle" font-size="9.5" fill="#229ED9">alert</text>

  <!-- Solana → cold path (signing hand-off) -->
  <line x1="1240" y1="412" x2="1240" y2="438" stroke="#7dd3fc" stroke-width="1.6" stroke-dasharray="3 3" marker-end="url(#arrow-ice)"/>
  <text x="1290" y="429" font-size="9.5" fill="#7dd3fc">approve &amp; sign</text>

  <!-- ───────── Cold path band ───────── -->
  <g id="cold-path">
    <rect x="80" y="442" width="1280" height="92" rx="14" fill="#0d1117" stroke="#7dd3fc" stroke-width="1.4" stroke-dasharray="2 4"/>
    <text x="720" y="472" text-anchor="middle" font-size="14.5" font-weight="700" fill="#7dd3fc">❄  Cold path — every signed transaction is signed by a human or a Squads multisig</text>
    <text x="720" y="496" text-anchor="middle" font-size="11.5" fill="#8b949e">The agent proposes the unsigned tx (durable nonce ⇒ no blockhash expiry while it waits). The agent <tspan font-weight="700" fill="#e6edf3">never holds a main wallet key</tspan> —</text>
    <text x="720" y="514" text-anchor="middle" font-size="11.5" fill="#8b949e">T2 (attest opt-in) is a scoped session key holding cents, locked to a {System, SAS, Memo} program allowlist.</text>
    <text x="720" y="530" text-anchor="middle" font-size="10.5" fill="#6e7681">claim moves value ⇒ rewards stays T0/T1 (multisig). attestation-only T2 ⇒ blast radius = fake attestations, not theft.</text>
  </g>

  <!-- ───────── Legend ───────── -->
  <g id="legend">
    <text x="80" y="572" font-size="11.5" font-weight="700" fill="#6e7681" letter-spacing="1.5">LEGEND</text>
    <g transform="translate(80,584)">
      <line x1="0" y1="10" x2="36" y2="10" stroke="#2dd4bf" stroke-width="2.4" marker-end="url(#arrow-teal)"/>
      <text x="46" y="14" font-size="11.5" fill="#e6edf3">unsigned tx → Solana</text>
    </g>
    <g transform="translate(290,584)">
      <line x1="0" y1="10" x2="36" y2="10" stroke="#229ED9" stroke-width="2.4" marker-end="url(#arrow-blue)"/>
      <text x="46" y="14" font-size="11.5" fill="#e6edf3">alert send (Telegram)</text>
    </g>
    <g transform="translate(510,584)">
      <line x1="0" y1="10" x2="36" y2="10" stroke="#ff7a59" stroke-width="2.4" marker-end="url(#arrow-coral)"/>
      <text x="46" y="14" font-size="11.5" fill="#e6edf3">public read (Relay)</text>
    </g>
    <g transform="translate(700,584)">
      <line x1="0" y1="10" x2="36" y2="10" stroke="#fbbf24" stroke-width="2.4" stroke-dasharray="6 4" marker-end="url(#arrow-amber)"/>
      <text x="46" y="14" font-size="11.5" fill="#e6edf3">roadmap (claim tx)</text>
    </g>
    <g transform="translate(890,584)">
      <line x1="0" y1="10" x2="36" y2="10" stroke="#7dd3fc" stroke-width="2.4" stroke-dasharray="3 3" marker-end="url(#arrow-ice)"/>
      <text x="46" y="14" font-size="11.5" fill="#e6edf3">cold-path sign</text>
    </g>

    <!-- custody tiers -->
    <text x="80" y="640" font-size="11.5" font-weight="700" fill="#6e7681" letter-spacing="1.5">CUSTODY TIERS</text>
    <g transform="translate(80,654)" font-size="11">
      <text x="0" y="16" fill="#2dd4bf" font-weight="700">T0</text>
      <text x="28" y="16" fill="#8b949e">read public data — no key, no risk</text>
      <text x="0" y="38" fill="#58a6ff" font-weight="700">T1</text>
      <text x="28" y="38" fill="#8b949e">agent builds unsigned tx; human/multisig signs</text>
      <text x="0" y="60" fill="#fbbf24" font-weight="700">T2</text>
      <text x="28" y="60" fill="#8b949e">scoped session key signs — allowlist + caps + identity (attest opt-in only)</text>
    </g>

    <!-- stack -->
    <text x="760" y="640" font-size="11.5" font-weight="700" fill="#6e7681" letter-spacing="1.5">STACK</text>
    <g transform="translate(760,654)" font-size="11">
      <text x="0" y="16" fill="#e6edf3">ZeroClaw + WIT component model</text>
      <text x="0" y="38" fill="#e6edf3">palinurus-core (crates.io v0.1.0) — PDA · borsh · versioned-tx · durable nonce</text>
      <text x="0" y="60" fill="#e6edf3">Solana Attestation Service · Helium cNFTs · Relay aggregator</text>
    </g>

    <text x="80" y="792" font-size="10.5" fill="#6e7681">MIT licensed · built for the Superteam Brasil × ZeroClaw bounty — Track C (DePIN &amp; the physical edge), the lane nobody else can build.</text>
  </g>
</svg>